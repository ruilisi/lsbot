  <!-- ls inside shield -->
  <text x="38" y="51" font-family="'Courier New',Courier,monospace" font-size="22" font-weight="700"
        fill="#4ade80" text-anchor="middle" letter-spacing="1">ls</text>
  <!-- bot wordmark -->
  <text x="80" y="57" font-family="'Courier New',Courier,monospace" font-size="42" font-weight="700"
